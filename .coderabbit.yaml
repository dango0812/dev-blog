language: ko-KR
reviews:
  # true: 리뷰어가 변경 요청(Request Changes)을 직접 걸 수 있도록 허용
  request_changes_workflow: true

  # 자동 리뷰 설정
  auto_review:
    enabled: true
    drafts: true
    base_branches:
      - .*
    # PR이 업데이트될 때 변경된 부분만 리뷰
    auto_incremental_review: true

  # 리뷰 톤 설정 (chill: 부드러운 톤)
  profile: 'chill'

  # 리뷰에서 제외할 파일/폴더 패턴
  path_filters:
    - '!**/node_modules/**'
    - '!**/.github/**'
    - '!**/.vscode/**'
    - '!**/public/**'
    - '!**/*.md'
    - '!**/*.json'
    - '!**/pnpm-lock.yaml'

  # 리뷰 가이드라인
  path_instructions:
    - path: '**/*.{ts,tsx,js,jsx}'
      instructions: |
        ## 일반적인 코딩 컨벤션

        ### 가독성
        - 매직 넘버 지양, 의미있는 상수 사용
        - 함수는 하나의 책임만 가지도록 작성 (최대 20줄 권장)
        - 중첩 깊이 최소화 (3단계 이하 권장)
        - 조건부 렌더링 시 && 대신 삼항 연산자 사용 (falsy 값 렌더링 방지)
        - ES6+ 기능 적극 활용 (Optional Chaining, Nullish Coalescing, 구조 분해 등)

        ### Import 규칙
        - 외부 디렉토리 참조 시 @/* path alias 절대 경로 사용
        - 동일 디렉토리 또는 하위 디렉토리 파일은 상대 경로 사용
        - simple-import-sort 플러그인에 의한 자동 정렬 준수

        ### Barrel Export 규칙
        - 디렉토리 단위 모듈은 index.ts를 통해 barrel export 사용
        - 단, 트리쉐이킹이 필요한 경우 직접 import를 우선 고려

        ## Next.js App Router

        ### Server Component vs Client Component
        - 모든 page.tsx, layout.tsx는 기본적으로 Server Component로 작성
        - 상태 관리, 이벤트 처리, 브라우저 API 사용이 필요한 경우에만 Client Component로 분리
        - Client Component의 크기를 최소화하고, 무거운 로직이나 데이터 페칭은 Server에서 처리 후 props로 전달
        - Server Component에서만 사용되는 모듈은 'server-only' 패키지로 보호

        ### 데이터 페칭
        - 서버 데이터 페칭은 Server Component에서 직접 async/await 사용
        - 블로그 특성상 정적 콘텐츠는 빌드 시점에 생성 (generateStaticParams 활용)
        - 동적 데이터가 필요한 경우 unstable_cache 또는 revalidateTag 활용

        ### 라우팅
        - Route Group (괄호 폴더)으로 레이아웃을 논리적으로 구분
        - layout.tsx에서 공통 레이아웃과 메타데이터 관리
        - loading.tsx, error.tsx, not-found.tsx 등 규약 파일 적극 활용

        ### 메타데이터 & SEO (블로그 필수)
        - 각 page.tsx에서 generateMetadata 함수로 동적 메타데이터 생성
        - title, description, openGraph, twitter 필드 필수 설정
        - robots.ts, sitemap.ts로 크롤러 제어 및 사이트맵 자동 생성
        - JSON-LD 구조화 데이터(Article, BlogPosting) 적용 권장
        - canonical URL 명시하여 중복 콘텐츠 방지

        ## React 19 & React Compiler

        ### React Compiler
        - babel-plugin-react-compiler가 활성화되어 있으므로 수동 memo, useCallback, useMemo 사용 불필요
        - 수동 메모이제이션이 있으면 오히려 컴파일러 최적화를 방해할 수 있으므로 제거 권장

        ### React 19
        - forwardRef 불필요, ref를 props로 직접 전달
        - useActionState, useFormStatus 등 React 19 내장 훅 활용
        - use() 훅으로 Promise/Context 소비 가능

        ### 컴포넌트 작성
        - 컴포넌트는 단일 책임 원칙 준수
        - JSX 내에서 복잡한 로직 지양, 별도의 핸들러 함수로 분리
        - 렌더링마다 재생성되지 않아도 되는 정적 JSX나 상수는 컴포넌트 외부로 호이스팅
        - 무거운 클라이언트 컴포넌트는 next/dynamic으로 동적 import 처리

        ## 스타일링 (Tailwind CSS v4 + CVA)
        - 컴포넌트 변형(variants)은 class-variance-authority(CVA)로 관리
        - 클래스 충돌 해소는 tailwind-merge의 cn() 유틸 사용
        - @theme 블록에서 커스텀 토큰 정의 (--color-primary 등)
        - @layer base → @layer components 순서로 스타일 우선순위 관리
        - tailwind-merge v3에서 커스텀 테마 컬러가 충돌 시 드롭될 수 있으므로 동일 cn() 호출 내 혼용 주의
        - 다크 모드 지원 시 dark: 변형 활용, CSS 변수 기반 테마 토큰 사용

        ## 타입스크립트
        - strict 모드 사용
        - 타입 명시적으로 작성 (any 사용 지양, 불가피 시 unknown + 타입 가드)
        - type과 interface 구분: 확장 가능한 객체는 interface, 유니온/인터섹션은 type
        - 함수 반환 타입은 복잡한 경우 명시적으로 작성

        ## 성능 최적화
        - next/image 컴포넌트로 이미지 최적화 (fill + sizes, priority for LCP)
        - next/dynamic으로 무거운 클라이언트 컴포넌트 지연 로딩
        - next/font로 폰트 자체 호스팅 및 레이아웃 시프트 방지
        - 정적 생성 가능한 페이지는 generateStaticParams로 빌드 시 미리 생성
        - <Suspense>와 loading.tsx로 스트리밍 SSR 활용

        ## 접근성 (Accessibility)
        - Semantic HTML 요소 우선 사용 (<button>, <nav>, <main>, <article> 등)
        - 모든 이미지에 의미 있는 alt 텍스트 제공
        - 키보드만으로 모든 인터랙션이 가능하도록 구현
        - 대화형 요소에 적절한 ARIA 속성 적용
        - Focus 상태가 시각적으로 명확히 표시되도록 focus-visible: 유틸 활용
        - <time datetime="..."> 태그로 날짜 시맨틱 마크업

        ## 보안 (Security)
        - dangerouslySetInnerHTML 사용 금지 (XSS 취약점)
        - 서버 전용 민감 정보는 NEXT_PUBLIC_ 접두사 없이 사용
        - headers(), cookies() API는 서버 측에서만 사용

        ## 기타
        - 충분한 근거와 함께 리뷰 제공
        - 정보 검증 후 답변
        - 간결하고 명확한 응답
        - 필요시 추가 컨텍스트 요청
        - 검증되지 않은 주장 지양
        - 한국어로 응답
